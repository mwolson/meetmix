name: Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: uvx ruff check meetmix/ tests/
      - run: uvx ty check meetmix/ tests/
      - run: uv pip install --system pulsectl>=0.5.0
      - run: python -m unittest discover -s tests -v
